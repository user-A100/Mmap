name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: 创建 local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: 安装 Gradle 并生成 Wrapper
        run: |
          cd android
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          rm -rf gradle-8.5 gradle-8.5-bin.zip

      - name: 复制网页资源到 Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html app.js styles.css sw.js manifest.json android/app/src/main/assets/
          cp leaflet.js leaflet.css android/app/src/main/assets/
          cp icon-192.png icon-512.png android/app/src/main/assets/

      - name: 生成各尺寸应用图标 (mipmap)
        run: |
          sudo apt-get install -y imagemagick > /dev/null 2>&1
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          convert icon-512.png -resize  48x48  android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon-512.png -resize  72x72  android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon-512.png -resize  96x96  android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon-512.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon-512.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: 构建 Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: Mmap-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mmap APK - ${{ github.sha }}"
          tag_name: "build-${{ github.run_number }}"
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
